{% extends 'estoque/base.html' %}

{% block title %}Criar Produto{% endblock %}

{% block content %}

<h2>Criar Produto</h2>

<form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
            <div class="text-danger">{{ error }}</div>
        {% endfor %}
    </div>
    {% endfor %}
    <button class="btn btn-primary">Salvar</button>
</form>

{% endblock %}
